<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이호영 포트폴리오</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
  }

  body {
    background: linear-gradient(180deg, #000000, #0a0a23);
    color: white;
    overflow-x: hidden;
  }

  header {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 2px;
  }

  p {
    margin-top: 10px;
    opacity: 0.7;
  }

  section {
    padding: 100px 20px;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    margin: 20px auto;
    width: 300px;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-10px);
    background: rgba(255,255,255,0.1);
  }

  .cursor {
    width: 15px;
    height: 15px;
    border: 2px solid white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
</style>
</head>

<body>

<div class="cursor"></div>

<header>
  <h1>이호영</h1>
  <p>Interactive Web Designer</p>
</header>

<section>
  <h2>About Me</h2>
  <div class="card">
    <p>인터랙티브 웹과 감성적인 디자인을 좋아합니다.<br>
    사용자 경험을 중요하게 생각하며 다양한 실험을 합니다.</p>
  </div>
</section>

<section>
  <h2>Skills</h2>
  <div class="card">HTML / CSS / JavaScript</div>
  <div class="card">3D Modeling (Blender)</div>
  <div class="card">UI/UX Design</div>
</section>

<section>
  <h2>Contact</h2>
  <div class="card">Instagram: lhy_0320</div>
</section>

<script>
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
